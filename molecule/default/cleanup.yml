---
# act_runner writes under MOLECULE_EPHEMERAL_DIRECTORY on the *host*; "root" inside the Molecule
# instance often cannot delete those bind mounts (user namespaces on CI). Stopping the app
# container on the instance, then removing the tree on localhost with become, fixes prune.
- name: Stop Gitea runner container on test instance
  hosts: all
  become: true
  gather_facts: false
  ignore_unreachable: true
  tasks:
    - name: Stop gitea runner test container (release bind mounts)
      community.docker.docker_container:
        name: gitea_runner
        state: stopped
      failed_when: false

- name: Remove bind-mounted workspace on control host (Molecule runner)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    molecule_ephemeral: "{{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') | default('', true) }}"
  tasks:
    - name: Remove gitea_runner data from ephemeral dir (host path)
      ansible.builtin.file:
        path: "{{ molecule_ephemeral }}/gitea_runner"
        state: absent
      become: true
      when: molecule_ephemeral | length > 0
